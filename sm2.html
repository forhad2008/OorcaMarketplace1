<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OorcaMarketplace - Premium Digital Brand</title>

    <style>
        :root {
            --dark-bg: #1a1b1c;
            --panel-bg: #242526;
            --accent-blue: #45aeeb;
            --text-main: #eeeeee;
            --text-dim: #aaaaaa;
            --gradient-blue: linear-gradient(135deg, #37b5d4, #365fe7, #5066dd);
            --glass-bg: rgba(20, 20, 20, 0.85);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--dark-bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 5%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .brand-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            width: 40px;
            height: auto;
        }

        header h1 {
            font-size: 22px;
            margin: 0;
            letter-spacing: 1px;
        }

        header h2 {
            font-size: 14px;
            color: var(--accent-blue);
            margin: 0;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent-blue);
        }

        /* --- HERO SECTION --- */
        .hero-combined {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 25px;
            padding: 40px 5%;
        }

        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('bg.jpg') center/cover;
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .hero h2 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .hero p {
            display: inline-block;
            background: var(--accent-blue);
            color: #000;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
        }

        .hero1 {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #333;
        }

        .hero1 h2 {
            font-size: 20px;
            color: var(--accent-blue);
        }

        .hero1 p {
            font-size: 14px;
            margin: 8px 0;
            color: #ccc;
        }

        /* --- SEARCH BAR --- */
        .search-container {
            margin-top: 25px;
            position: relative;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid #f1f1f1;
            background: rgba(212, 212, 212, 1);
            color: rgb(56, 55, 55);
            outline: none;
        }

        .suggestions {
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            z-index: 101;
            display: none;
            overflow: hidden;
        }

        .suggestions a {
            display: block;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid #333;
        }

        .suggestions a:hover {
            background: #333;
        }

        /* --- BUTTON CONTROLS --- */
        .category-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px 5%;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-primary {
            background: #fff;
            color: #000;
        }

        .btn-alpha {
            background: #007bb5;
            color: white;
        }

        .btn-beta {
            background: #00a884;
            color: white;
        }

        .btn-action:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        /* --- PRODUCT GRID --- */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
            padding: 40px 5%;
        }

        .product {
            perspective: 1000px;
            text-decoration: none;
            color: inherit;
        }

        .product-inner {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 15px;
            transition: 0.4s;
            border: 1px solid #333;
            text-align: center;
        }

        .product-inner:hover {
            transform: translateY(-10px);
            border-color: var(--accent-blue);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .product h3 {
            font-size: 16px;
            margin: 10px 0;
            height: 40px;
            overflow: hidden;
        }

        .price {
            color: var(--accent-blue);
            font-weight: bold;
            font-size: 18px;
        }

        /* --- CART PANEL --- */
        .cart-panel {
            position: fixed;
            right: 20px;
            top: 80px;
            width: 300px;
            background: #111;
            border: 1px solid #444;
            padding: 20px;
            border-radius: 12px;
            display: none;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .hero-combined {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="brand-box">
            <div class="logo"><img src="orca.png" alt="Oorca Logo" /></div>
            <div>
                <h1>Oorca</h1>
                <h2>Digital brand</h2>
            </div>
        </div>
        <nav>
            <a href="#">Cards</a>
            <a href="#">Logos</a>
            <a href="#">Resume</a>
            <a href="#">Banners</a>
        </nav>
        <div style="display:flex; gap:10px;">
            <a href="contact.html" class="btn-action btn-alpha" style="padding: 8px 15px;">Chat</a>
            <button id="cartButton" class="btn-action btn-primary" style="padding: 8px 15px;">Cart (0)</button>
        </div>
    </header>

    <section class="hero-combined">
        <div class="hero">
            <h2>Unleash Your Business</h2>
            <p>Premium Design Collection</p>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search products...">
                <div class="suggestions" id="suggestions"></div>
            </div>
        </div>
        <div class="hero1">
            <h2>Why choose Oorca?</h2>
            <p>✓ Ready-made + 3D Presentation</p>
            <p>✓ Professional & Limited collections</p>
            <p>✓ Instant delivery & Free editing help</p>
        </div>
    </section>

    <div class="category-actions">
        <a href="sm.html" class="btn-action btn-primary">See More</a>
        <a href="alpha.html" class="btn-action btn-alpha">Alpha Products</a>
        <a href="beta.html" class="btn-action btn-beta">Beta Products</a>
    </div>

    <section class="products" id="productList"></section>

    <div class="cart-panel" id="cartBox">
        <h3 style="margin-top:0">Your Cart</h3>
        <div id="cartItems"></div>
        <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
        <p>Total: <span class="price" id="cartTotal">$0</span></p>
        <button class="btn-action btn-primary" style="width:100%" onclick="clearCart()">Clear Cart</button>
    </div>

    <script>
        const cart = [];
        const products = [
            { id: 26, name: 'Alpha Business Card V.01', price: 8, img: 'jpg1/26.2.webp', link: '26.html' },
            { id: 27, name: 'Alpha Business Card V.02', price: 9, img: 'jpg1/27.2.webp', link: '27.html' },
            { id: 12, name: 'Business Banner Pro', price: 8, img: 'jpg/12.1.webp', link: '12.html' },
            { id: 13, name: 'Professional Logo Design', price: 6, img: 'jpg/13.1.webp', link: '13.html' },
            { id: 15, name: 'Modern Resume Template', price: 5, img: 'jpg/15.3.webp', link: 'resume.html' }
            // ... Add more products here
        ];

        const categories = [
            { name: 'Business Card', link: 'business-card.html' },
            { name: 'Logo Design', link: 'logo.html' },
            { name: 'Resume', link: 'resume.html' }
        ];

        function renderProducts(list) {
            const container = document.getElementById('productList');
            container.innerHTML = '';
            list.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product';
                div.innerHTML = `
                    <div class="product-inner">
                        <a href="${p.link}" style="text-decoration:none; color:inherit;">
                            <img src="${p.img}" alt="${p.name}">
                            <h3>${p.name}</h3>
                            <p class="price">$${p.price}</p>
                        </a>
                        <button class="btn-action btn-alpha" style="width:100%; margin-top:10px" onclick="addToCart(${p.id})">Add to Cart</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Live Filtering Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();

            // 1. Filter Grid
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));
            renderProducts(filtered);

            // 2. Suggestions Dropdown
            const suggBox = document.getElementById('suggestions');
            suggBox.innerHTML = '';
            if (query.length > 0) {
                const matchedCats = categories.filter(c => c.name.toLowerCase().includes(query));
                matchedCats.forEach(c => {
                    const a = document.createElement('a');
                    a.href = c.link;
                    a.textContent = c.name;
                    suggBox.appendChild(a);
                });
                suggBox.style.display = matchedCats.length ? 'block' : 'none';
            } else {
                suggBox.style.display = 'none';
            }
        });

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
            document.getElementById('cartBox').style.display = 'block';
        }

        function updateCart() {
            const itemsDiv = document.getElementById('cartItems');
            const cartBtn = document.getElementById('cartButton');
            let total = 0;
            itemsDiv.innerHTML = '';
            cart.forEach(item => {
                total += item.price;
                itemsDiv.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;">
                    <span>${item.name}</span><b>$${item.price}</b>
                </div>`;
            });
            document.getElementById('cartTotal').innerText = '$' + total;
            cartBtn.innerText = `Cart (${cart.length})`;
        }

        function clearCart() {
            cart.length = 0;
            updateCart();
            document.getElementById('cartBox').style.display = 'none';
        }

        document.getElementById('cartButton').addEventListener('click', () => {
            const box = document.getElementById('cartBox');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        });

        // Initial Render
        renderProducts(products);
    </script>
</body>

</html>
